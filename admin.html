<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Prabha Agencies</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Admin-specific styles */
        .admin-body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .dashboard-container {
            display: none;
            width: 90%;
            max-width: 1000px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 50px auto;
        }

        .btn-logout {
            background: #ff4d4d;
            color: #fff;
            margin-top: 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .admin-lists-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 50px;
        }

        @media (max-width: 992px) {
            .form-grid, .admin-lists-grid {
                grid-template-columns: 1fr;
            }
        }

        .image-preview {
            width: 100%;
            min-height: 150px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            align-content: start;
            background: #fafafa;
        }

        .image-preview .preview-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-img-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 77, 77, 0.9);
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            z-index: 5;
        }

        .project-list-admin, .gallery-list-admin {
            margin-top: 30px;
        }

        .project-item-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .project-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .project-item-admin img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }

    </style>
</head>
<body class="admin-body">

    <!-- Login Form -->
    <div id="login-section" class="login-card">
        <h2 style="color: var(--primary-blue); margin-bottom: 20px;">Admin Login</h2>
        <form id="login-form">
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="username" placeholder="Username (admin)" required>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="password" id="password" placeholder="Password (1234)" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            <p id="login-error" style="color: red; margin-top: 10px; display: none;">Invalid credentials!</p>
        </form>
        <a href="index.html" style="display: block; margin-top: 20px; color: var(--text-light);">Back to Home</a>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" class="dashboard-container">
        <div class="admin-header">
            <div>
                <h1 style="color: var(--primary-blue);">Admin Dashboard</h1>
                <p>Manage your projects and uploads</p>
            </div>
            <button id="logout-btn" class="btn btn-logout">Logout</button>
        </div>

        <div class="form-grid">
            <!-- Project Form -->
            <div class="project-form-container">
                <h3 id="project-form-title">Add New Project</h3>
                <form id="project-form" style="margin-top: 20px;">
                    <input type="hidden" id="project-editing-id">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <input type="text" id="proj-title" placeholder="Project Title (e.g. Villa In Madampakkam)" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <textarea id="proj-desc" rows="4" placeholder="Brief Description..." required></textarea>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <select id="proj-category" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 0.9rem;">
                            <option value="" disabled selected>Select Category</option>
                            <option value="construction">Construction</option>
                            <option value="interiors">Interiors</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; color: #666; margin-bottom: 5px; display: block;">Select Project Images (Hold Ctrl/Cmd for multiple)</label>
                        <input type="file" id="proj-image" accept="image/*" multiple>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="project-submit-btn" class="btn btn-primary">Add Project</button>
                        <button type="button" id="project-cancel-btn" class="btn" style="display: none; background: #eee; border: 1px solid #ccc;">Cancel Edit</button>
                    </div>
                </form>
                <div class="preview-container" style="margin-top: 20px;">
                    <h4 style="margin-bottom: 10px; font-size: 0.9rem; color: var(--primary-blue);">Project Image Preview</h4>
                    <div class="image-preview" id="project-image-preview-box">
                        <p style="color: #999;">No images selected</p>
                    </div>
                </div>
            </div>

            <!-- Gallery Form -->
            <div class="gallery-form-container">
                <h3 id="gallery-form-title">Add New Gallery Item</h3>
                <form id="gallery-form" style="margin-top: 20px;">
                    <input type="hidden" id="gallery-editing-id">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <input type="text" id="gal-title" placeholder="Gallery Title (e.g. Interior Finishing)" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <textarea id="gal-desc" rows="4" placeholder="Brief Description..." required></textarea>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <select id="gal-category" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 0.9rem;">
                            <option value="" disabled selected>Select Category</option>
                            <option value="construction">Construction</option>
                            <option value="interiors">Interiors</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; color: #666; margin-bottom: 5px; display: block;">Select Gallery Images (Hold Ctrl/Cmd for multiple)</label>
                        <input type="file" id="gal-image" accept="image/*" multiple>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="gallery-submit-btn" class="btn btn-primary">Add Gallery Item</button>
                        <button type="button" id="gallery-cancel-btn" class="btn" style="display: none; background: #eee; border: 1px solid #ccc;">Cancel Edit</button>
                    </div>
                </form>
                <div class="preview-container" style="margin-top: 20px;">
                    <h4 style="margin-bottom: 10px; font-size: 0.9rem; color: var(--primary-blue);">Gallery Image Preview</h4>
                    <div class="image-preview" id="gallery-image-preview-box">
                        <p style="color: #999;">No images selected</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="admin-lists-grid">
            <div class="project-list-admin">
                <h3>Current Projects</h3>
                <div id="admin-projects-list">
                    <!-- Projects list -->
                </div>
            </div>
            <div class="gallery-list-admin">
                <h3>Current Gallery Items</h3>
                <div id="admin-gallery-list">
                    <!-- Gallery list -->
                </div>
            </div>
        </div>
    </div>



    <script type="module" src="admin.js"></script>
</body>
</html>
